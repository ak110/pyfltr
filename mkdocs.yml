site_name: pyfltr
site_url: https://ak110.github.io/pyfltr/
site_description: Formatters, Linters, and Testers Runner
repo_url: https://github.com/ak110/pyfltr
repo_name: ak110/pyfltr

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang: ja
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        Python / Rust / .NET / TypeScript・JavaScript / ドキュメントなど多言語プロジェクトのformatter・linter・testerを単一コマンドで並列実行するCLIツール。
        設定から実行までの導入手順は[はじめに](guide/getting-started.md)を参照。
        対応ツール一覧は[対応ツール](guide/index.md)を参照。

        ## サブコマンド

        - `pyfltr ci`: CI向け全チェック（formatterの変更も失敗扱い）
        - `pyfltr run`: ローカル向け全チェック（fix→format→lint/test）
        - `pyfltr fast`: 軽量チェック（pre-commit向け。重いツールを除外）
        - `pyfltr run-for-agent`: エージェント向け（`run`の出力形式既定値を`jsonl`に変更）
        - `pyfltr config <action>`: 設定ファイル操作（`get` / `set` / `delete` / `list`）
        - `pyfltr generate-shell-completion <shell>`: シェル補完スクリプト生成
        - `pyfltr list-runs` / `pyfltr show-run <run_id>`: 実行履歴参照
        - `pyfltr command-info <tool>`: ツール起動方式確認（`--check`オプションあり）
        - `pyfltr grep <pattern> [paths...]`: ファイル横断の正規表現検索（pyfltr exclude/.gitignore尊重）
        - `pyfltr replace <pattern> <replacement> [paths...]`: 横断置換（既定で書き込み・`--undo`で取消）
        - `pyfltr mcp`: MCPサーバー起動

        `--commands=<tool>`で個別ツールのみ実行できる（例: `pyfltr run --commands=textlint docs/`）。
        詳細は[CLIの使い方](guide/usage.md)を参照。

        ## 対応ツール

        Python系・JS/TS系・Rust系・.NET系・ドキュメント系・その他を横断的にサポート。
        Python系ツール一式は本体依存に同梱されており追加インストール不要。
        `preset = "latest"` + 言語カテゴリキーの`true`指定で当該言語の推奨ツール一式が有効化される。

        - Python: `ruff-format` / `uv-sort` / `pylint` / `mypy` / `ruff-check` / `pyright` / `ty` / `pytest`
        - JS/TS: `prettier` / `tsc` / `eslint` / `biome` / `oxlint` / `vitest`
        - Rust: `cargo-fmt` / `cargo-clippy` / `cargo-check` / `cargo-test` / `cargo-deny`
        - .NET: `dotnet-format` / `dotnet-build` / `dotnet-test`
        - ドキュメント: `markdownlint` / `textlint` / `designmd` / `lychee`
        - シェル: `shfmt` / `shellcheck`
        - YAML/TOML: `yamllint` / `taplo`
        - CI/Docker/EditorConfig: `actionlint` / `glab-ci-lint` / `hadolint` / `ec`
        - セキュリティ/スペル: `gitleaks` / `typos` / `semgrep`
        - SQL: `sqlfluff`
        - その他: `pre-commit`

        詳細は[対応ツール一覧](guide/index.md)を参照。

        ## 設定の基本

        `pyproject.toml` の `[tool.pyfltr]` に `preset = "latest"` と言語カテゴリキーを設定する。
        詳細は[設定項目](guide/configuration.md)を参照。

        ## LLMエージェント向け出力（`--output-format=jsonl`）

        `pyfltr run-for-agent`でJSONL形式の構造化出力が得られる。
        詳細は[CLIの使い方](guide/usage.md)を参照。

      sections:
        ホーム:
          - index.md: ドキュメント入口
        使い方:
          - guide/getting-started.md: インストール・設定・実行・コーディングエージェント連携
          - guide/index.md: 対応ツール一覧・コンセプト
          - guide/usage.md: CLIの使い方・オプション・UI説明・コーディングエージェント連携
          - guide/grep-replace.md: grep/replaceの使い方・オプション・誤爆除外フロー・undo運用・MCP公開ツール
          - guide/troubleshooting.md: MCP stdout占有・PRE_COMMIT検出・対象ファイル空・アーカイブ容量確認
        設定:
          - guide/configuration.md: プリセット・言語カテゴリゲート・設定項目一覧・グローバル設定・並列実行
          - guide/configuration-tools.md: ツール別設定（python-runner / js-runner / bin-runnerのカテゴリ委譲と直接指定値の対称12値設定・2段階実行・カスタムコマンド）
          - guide/recommended.md: Pythonプロジェクトの推奨設定例・タスクランナー・CI設定
          - guide/recommended-nonpython.md: TypeScript/JS・Rust・.NETプロジェクトの推奨設定例
          - guide/custom-commands.md: カスタムコマンドの設定例集
        開発者向け:
          - development/development.md: 開発環境構築・ドキュメント・リリース手順
          - development/architecture.md: 実行パイプライン・モジュール構成・実行アーカイブ・出力フォーマット・MCPサーバー

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - 使い方:
      - はじめに: guide/getting-started.md
      - 対応ツール: guide/index.md
      - CLIコマンド: guide/usage.md
      - 検索と置換: guide/grep-replace.md
      - トラブルシューティング: guide/troubleshooting.md
  - 設定:
      - 設定項目: guide/configuration.md
      - 設定項目（ツール別）: guide/configuration-tools.md
      - 推奨設定例: guide/recommended.md
      - 推奨設定例（非Pythonプロジェクト）: guide/recommended-nonpython.md
      - カスタムコマンド例: guide/custom-commands.md
  - 開発者向け:
      - 開発手順: development/development.md
      - アーキテクチャ概要: development/architecture.md
