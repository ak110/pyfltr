site_name: pyfltr
site_url: https://ak110.github.io/pyfltr/
site_description: Formatters, Linters, and Testers Runner
repo_url: https://github.com/ak110/pyfltr
repo_name: ak110/pyfltr

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang: ja
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        各種formatter / linter / testerをまとめて並列実行するCLIツール。

        ## サブコマンド

        - `pyfltr ci`: 全チェック。formatterによる変更も失敗と判定する（CI向け）
        - `pyfltr run`: 全チェック。fix段→formatter段→linter/tester段の順で、fix-args定義済みlinterの自動修正→formatter→残りの検査を実行する（ローカル向け）
        - `pyfltr fast`: 軽量チェック。`run`と同じ3段構成だが、mypy/pylint/pytest等の重いツールを除外（pre-commit向け）
        - `pyfltr generate-config`: pyproject.toml用の設定雛形を出力

        `--no-fix`で`run`/`fast`のfix段を抑止できる。`ci`は副作用回避のため元々fix段を持たない。

        ## 対応ツール

        Python: pyupgrade / autoflake / isort / black / ruff format / ruff check / pflake8 / mypy / pylint / pyright / ty / pytest / uv-sort
        Rust: cargo fmt / cargo clippy / cargo check / cargo deny / cargo test
        .NET: dotnet format / dotnet build / dotnet test
        JS/TS: eslint / prettier / biome / oxlint / tsc / vitest
        ドキュメント: markdownlint-cli2 / textlint
        その他: ec / shellcheck / shfmt / typos / actionlint / pre-commit

        `preset = "latest"` で主要ツールを一括有効化できる。

        ## 設定の基本

        `pyproject.toml` の `[tool.pyfltr]` で設定する。

        ```toml
        [tool.pyfltr]
        preset = "latest"
        pylint-args = ["--jobs=4"]
        ```

        非Pythonプロジェクトでは `python = false` でPython系ツールを無効化し、対象言語のツールを個別に有効化する。

        ## LLMエージェント向け出力（`--output-format=jsonl`）

        `--output-format=jsonl`でJSON Lines形式の構造化出力が得られる。レコードは4種類。

        - `warning`: pyfltr が検出した設定・実行時の警告（`source` で発生元を識別）
        - `diagnostic`: 1診断1行（`tool` / `file` / `line` / `col` / `rule` / `severity` / `msg`）
        - `tool`: ツールごとの実行結果サマリ（`status` / `elapsed` / `diagnostics` / `rc`）
        - `summary`: 最終1行の全体集計（`succeeded` / `formatted` / `failed` / `skipped` / `diagnostics` / `exit`）

        出力順は`warning`→`diagnostic`（file/line/col/command順）→`tool`（`pyproject.toml`定義順）→`summary`（1行）で固定。

        `--output-file`未指定時はstdoutへJSONLのみを書き、進捗ログやTUIは無音化される。指定時はファイルへJSONLを書き、stdoutには従来どおりのテキスト出力を並行出力する（ローカル実行で進捗を追える）。

        ```shell
        pyfltr run --output-format=jsonl | tail -30
        ```

      sections:
        ホーム:
          - index.md: ドキュメント入口
        使い方:
          - guide/index.md: 対応ツール一覧・コンセプト・インストール
          - guide/usage.md: CLIの使い方・オプション・UI説明・LLM連携
        設定:
          - guide/configuration.md: 基本設定・プリセット・並列実行など
          - guide/configuration-tools.md: ツール別設定（2段階実行・bin-runner・npm系・カスタムコマンド）
          - guide/recommended.md: Pythonプロジェクトの推奨設定例・タスクランナー・CI設定
          - guide/recommended-nonpython.md: TypeScript/JS・Rust・.NETプロジェクトの推奨設定例
          - guide/custom-commands.md: カスタムコマンドの設定例集
        開発者向け:
          - development/development.md: 開発環境構築・ドキュメント・リリース手順

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - 使い方:
      - 概要: guide/index.md
      - CLIコマンド: guide/usage.md
      - 設定項目: guide/configuration.md
      - 設定項目（ツール別）: guide/configuration-tools.md
      - 推奨設定例: guide/recommended.md
      - 推奨設定例（非Pythonプロジェクト）: guide/recommended-nonpython.md
      - カスタムコマンド例: guide/custom-commands.md
  - 開発者向け:
      - 概要: development/index.md
      - 開発手順: development/development.md
