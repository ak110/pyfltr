# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: check-ast
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: name-tests-test
        # tests/smoke_data/ 配下は smoke テスト用の入力サンプル群。
        # pytest対象はsmoke_test.py本体のみで、サンプル側は単独実行されないため命名規則の対象外とする。
        exclude: ^tests/smoke_data/
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: pyfltr
        name: pyfltr
        entry: uv run --frozen --with-editable=. pyfltr fast
        types_or: [python, markdown, toml]
        require_serial: true
        language: system
      - id: mkdocs-build
        name: mkdocs build --strict
        entry: uv run --frozen mkdocs build --strict --quiet --site-dir=/tmp/mkdocs-check
        language: system
        pass_filenames: false
        files: ^(docs/|mkdocs\.yml|README\.md|CLAUDE\.md)
