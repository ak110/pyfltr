workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
  PYTHONDEVMODE: "1"
  # サプライチェーン攻撃対策: uvがlockfileを常に尊重する
  UV_FROZEN: "1"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  PNPM_STORE_PATH: "$CI_PROJECT_DIR/.cache/pnpm"

default:
  interruptible: true

test:
  # uv + Python が導入済みの公式イメージを使用する
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm
  parallel:
    matrix:
      # - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]
      - PYTHON_VERSION: ["3.13"]
  cache:
    - key: uv-linux-$PYTHON_VERSION
      paths:
        - .cache/uv/
    - key: pnpm-linux
      paths:
        - .cache/pnpm/
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl git
    # Node.js (LTS) + pnpm
    - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
    - apt-get install -y -qq nodejs
    - npm install --global pnpm
    - pnpm config set minimum-release-age 1440 --global
    - pnpm config set store-dir "$PNPM_STORE_PATH"
    # mise
    - curl https://mise.run | sh
    - export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.local/share/mise/bin:$PATH"
    - mise trust --all
    # 依存インストール
    - uv sync --all-extras --all-groups
  script:
    # --output-file 指定時はstdoutにtext形式の進捗も出力される
    - uv run pyfltr ci --output-format=code-quality --output-file=code-quality-report.json
  artifacts:
    # lintエラーで失敗してもレポートを取り込めるよう always にする
    when: always
    reports:
      codequality: code-quality-report.json
  after_script:
    - uv cache prune --ci

# とりあえず無効にしておく
.test-windows:
  tags:
    - windows
  variables:
    PYTHON_VERSION: "3.14"
  cache:
    - key: uv-windows-$PYTHON_VERSION
      paths:
        - .cache/uv/
    - key: pnpm-windows
      paths:
        - .cache/pnpm/
  before_script:
    # uv + 指定バージョンのPythonをインストール
    - powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
    - $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
    - uv python install $env:PYTHON_VERSION
    - uv python pin $env:PYTHON_VERSION
    # Node.js (LTS) + pnpm
    - choco install --yes --no-progress nodejs-lts
    - npm install --global pnpm
    - pnpm config set minimum-release-age 1440 --global
    - pnpm config set store-dir $env:PNPM_STORE_PATH
    # mise
    - winget install --id jdx.mise --exact --source winget --accept-source-agreements --accept-package-agreements
    - $env:PATH = "$env:USERPROFILE\.local\share\mise\shims;$env:PATH"
    - mise trust --all
    # 依存インストール
    - uv sync --all-extras --all-groups
  script:
    - uv run pyfltr ci --output-format=code-quality --output-file=code-quality-report.json
  artifacts:
    when: always
    reports:
      codequality: code-quality-report.json
  after_script:
    - uv cache prune --ci
