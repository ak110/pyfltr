name: Audit

# 依存の脆弱性監査（uv audit）を定期実行する。監査は外部脆弱性データベースへ
# 問い合わせるため結果がコード変更と無関係に変動する。push/PR毎のCIには載せず、
# スケジュール実行と手動実行に限定する。
# 検出結果はSARIF形式でGitHub Code Scanningへアップロードする。
# 同一の脆弱性は1件のアラートに集約され、解消後の定期実行で自動クローズされる。
on:
  schedule:
    # 毎日 06:00 UTC（JST 15:00）に実行する。
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
  PYTHONDEVMODE: "1"
  # サプライチェーン攻撃対策: uvがlockfileを尊重する
  UV_FROZEN: "1"

jobs:
  audit:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ak110/pyfltr:latest
    defaults:
      run:
        shell: bash
    env:
      # mise・pinact等がGitHub APIを呼び出す際のレート制限（403）回避
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: GitHub Actionsのピン留め検証
        run: pinact run --check

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run dependency audit
        # uv-auditはネットワーク必須で結果が変動するため、pyproject.tomlでは有効化していない。
        # この定期ジョブだけで有効化するため、一時グローバル設定をPYFLTR_GLOBAL_CONFIGで読ませる。
        # load_configはproject未指定キーにglobal値を残すため、uv-auditがtrueになる。
        # severity未指定（error）で、脆弱性検出時はexit 1を返す。
        # 本リポはPython専用でpackage.jsonを持たないため、auditグループ全体ではなくuv-audit単独を指定する。
        # SARIF出力をファイルへ保存し、後続ステップでCode Scanningへアップロードする。
        run: |
          set -euo pipefail
          audit_config="${RUNNER_TEMP}/pyfltr-audit-config.toml"
          printf '[tool.pyfltr]\nuv-audit = true\n' > "${audit_config}"
          # 脆弱性検出時はpyfltrがexit 1を返す。後続ステップへ到達させるため終了コードを保持する。
          audit_rc=0
          PYFLTR_GLOBAL_CONFIG="${audit_config}" uv run pyfltr ci --commands=uv-audit --output-format=sarif \
            > "${RUNNER_TEMP}/audit.sarif" || audit_rc=$?
          # SARIFにuv-auditのrunが含まれることを検証する。
          # 設定読み込み失敗等でuv-auditが無言スキップされた場合はrunが存在しない。
          if ! jq -e '.runs[] | select(.tool.driver.name == "uv-audit")' \
               "${RUNNER_TEMP}/audit.sarif" > /dev/null 2>&1; then
            echo "::error::uv-audit が実行されませんでした（SARIFにuv-auditのrunが含まれていません）。"
            exit 1
          fi
          # pyfltrは全失敗をexit 1に正規化するため、終了コードだけでは脆弱性検出と
          # ツール異常を区別できない。非0時はSARIFの検出結果有無で分岐する。
          if [ "${audit_rc}" -ne 0 ]; then
            if jq -e '.runs[] | select(.tool.driver.name == "uv-audit") | .results | length > 0' \
                 "${RUNNER_TEMP}/audit.sarif" > /dev/null 2>&1; then
              # 脆弱性検出: SARIFをアップロードしCode Scanningに委ねる（次ステップ）。
              # ワークフローは成功扱いとする（Code Scanning側でアラートを管理するため）。
              echo "脆弱性が検出されました。Code Scanningへアップロードします。"
            else
              # ツール異常: 空のSARIFをアップロードすると既存アラートが誤クローズされるため、
              # アップロードせずワークフローを失敗させる。
              echo "::error::uv-audit の実行に失敗しました（SARIFに検出結果がありません）。"
              exit 1
            fi
          fi

      - name: SARIFをCode Scanningへアップロード
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ runner.temp }}/audit.sarif
          category: uv-audit
