name: CI

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
  PYTHONDEVMODE: "1"
  # サプライチェーン攻撃対策: uvがlockfileを尊重する
  UV_FROZEN: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ak110/pyfltr:latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      # mise・pinact等がGitHub APIを呼び出す際のレート制限（403）回避
      # container jobでは明示しないとsecrets.GITHUB_TOKENがコンテナへ渡らない
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GitHub Actionsのピン留め検証
        run: pinact run --check

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /cache
          key: pyfltr-cache-${{ runner.os }}-py${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Test with pyfltr
        # `CI=true` を明示し、smoke test がツール不在時にスキップへ逃げず失敗扱いとなるようにする。
        env:
          CI: "true"
        run: uv run --with-editable=. pyfltr ci --output-format=github-annotations

      - name: Prune uv cache for CI
        run: uv cache prune --ci

  test-windows:
    runs-on: windows-latest
    env:
      # mise・pinact等がGitHub APIを呼び出す際のレート制限（403）回避。
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: latest

      - name: Configure pnpm security
        run: pnpm config set minimum-release-age 1440 --global

      - name: Get pnpm store path
        id: pnpm-store-win
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store-win.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}
          restore-keys: pnpm-store-${{ runner.os }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install smoke test tooling via mise
        # tests/smoke_test.py が起動するmise経由ツールをWindows runnerでも揃える。
        # Linux jobは公式pyfltrイメージに同梱済みのため不要。
        # 既定シェル（PowerShell）でもbash継続`\`に依存せず動くよう単一行で記述する。
        run: mise use --global shfmt@latest actionlint@latest editorconfig-checker@latest taplo@latest hadolint@latest gitleaks@latest

      - name: Install shellcheck via chocolatey
        # shellcheckはmise registryでもインストールできるが、Windowsではzip内サブディレクトリ
        # （shellcheck-vX.Y.Z\shellcheck.exe）構造に対応せず`mise exec`でバイナリを解決できない。
        # windows-latestに同梱のchocolateyで直接配置してPATH上の素のバイナリとして利用する。
        run: choco install -y shellcheck

      - name: Install smoke test tooling via uv
        # yamllint / typos / pre-commit はpyfltr本体依存に含まれない単独ツール。Windows runnerにも導入する。
        run: |
          uv tool install yamllint
          uv tool install typos
          uv tool install pre-commit

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Test with pyfltr
        # `CI=true` を明示し、smoke test がツール不在時にスキップへ逃げず失敗扱いとなるようにする。
        env:
          CI: "true"
        run: uv run --with-editable=. pyfltr ci --output-format=github-annotations

      - name: Prune uv cache for CI
        run: uv cache prune --ci
