name: Docker Build

on:
  workflow_call:
    inputs:
      version:
        description: "PyPIバージョン番号（例: 0.16.0）。空のときはPyPIから最新公開版を取得する。"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "PyPIバージョン番号（例: 0.16.0）。空のときはPyPIから最新公開版を取得する。"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ``docker/build-push-action`` で ``context: docker`` を解決するため、
      # 別ワークフローとして独立実行される本ファイルでも先にチェックアウトする。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Resolve PyPI version
        id: version
        run: |
          set -euo pipefail
          input_version="${{ inputs.version }}"
          if [ -z "${input_version}" ]; then
            echo "Input version is empty; fetching latest pyfltr version from PyPI"
            input_version="$(curl -fsSL "https://pypi.org/pypi/pyfltr/json" | jq -r '.info.version')"
            if [ -z "${input_version}" ] || [ "${input_version}" = "null" ]; then
              echo "Failed to fetch latest pyfltr version from PyPI" >&2
              exit 1
            fi
          fi
          version="${input_version#v}"
          echo "Resolved version: ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `uv publish --check-url` 直後でも PyPI 配信エッジ (Fastly) のキャッシュ反映には
      # ラグがあり、Docker build 内の `uv tool install pyfltr==X.Y.Z` が
      # 「No solution found」で失敗する事象が継続発生したため、Docker build 直前に
      # 同等条件 (clean cache) で解決可能になるまで polling する。
      # extras (`[python]`) 込みで解決確認することで、Docker build と同じ要求形を検証する。
      # 利用者向けコマンド `uv run --with="pyfltr[python]" pyfltr` の解決可能性も間接的に確認できる。
      # さらに ``required_consecutive`` 回連続成功するまで待つことで、
      # 単発でエッジを掴んだ瞬間だけ通る揺らぎを排除する。
      - name: Wait for PyPI propagation
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          required_consecutive=3
          success_count=0
          for i in $(seq 1 60); do
            if uv tool install --reinstall --no-cache "pyfltr[python]==${version}" >/dev/null 2>&1; then
              success_count=$((success_count + 1))
              echo "Attempt ${i}/60: pyfltr[python]==${version} resolvable (${success_count}/${required_consecutive})"
              uv tool uninstall pyfltr >/dev/null 2>&1 || true
              if [ "${success_count}" -ge "${required_consecutive}" ]; then
                echo "pyfltr[python]==${version} is stably installable from PyPI"
                exit 0
              fi
            else
              if [ "${success_count}" -gt 0 ]; then
                echo "Attempt ${i}/60: resolution flapped, resetting consecutive counter"
              else
                echo "Attempt ${i}/60: pyfltr[python]==${version} not yet resolvable"
              fi
              success_count=0
            fi
            sleep 10
          done
          echo "Timeout waiting for PyPI propagation of pyfltr[python]==${version}" >&2
          exit 1

      # Wait for PyPI propagation を通過しても Docker builder ホストが別エッジを掴んで
      # 「No solution found」になる事象が稀に残るため、初回失敗時のみ短い間を空けて再試行する。
      # 1 回目失敗時は ``continue-on-error`` でエラーを無視し、再試行 step が結果を引き取る。
      - name: Build and push Docker image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PYFLTR_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/ak110/pyfltr:${{ steps.version.outputs.tag }}
            ghcr.io/ak110/pyfltr:latest
          secrets: |
            GITHUB_TOKEN=${{ github.token }}

      - name: Wait before Docker build retry
        if: steps.docker_build.outcome == 'failure'
        run: |
          echo "Initial Docker build failed, waiting 30s before retry..."
          sleep 30

      - name: Build and push Docker image (retry)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PYFLTR_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/ak110/pyfltr:${{ steps.version.outputs.tag }}
            ghcr.io/ak110/pyfltr:latest
          secrets: |
            GITHUB_TOKEN=${{ github.token }}
