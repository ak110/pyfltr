name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: バージョン番号の更新タイプ
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
        default: PATCH

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
    steps:
      # 別ブランチからの誤リリースを防止
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          echo "Checking CI result for commit: ${commit_sha}"

          # 最大待機時間 (秒): 30 分
          max_wait=1800
          wait_interval=30
          elapsed=0

          while [ "${elapsed}" -lt "${max_wait}" ]; do
            # ci.yaml ワークフローの最新の実行結果を取得
            workflow_runs="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?branch=master&head_sha=${commit_sha}&per_page=1")"

            total_count="$(echo "${workflow_runs}" | jq -r '.total_count')"
            if [ "${total_count}" = "0" ]; then
              echo "No CI workflow found for sha=${commit_sha}. Waiting..."
              sleep "${wait_interval}"
              elapsed="$((elapsed + wait_interval))"
              continue
            fi

            status="$(echo "${workflow_runs}" | jq -r '.workflow_runs[0].status')"
            conclusion="$(echo "${workflow_runs}" | jq -r '.workflow_runs[0].conclusion')"
            echo "Current status: ${status}, conclusion: ${conclusion}"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "CI passed successfully"
                exit 0
              fi
              echo "Error: CI did not succeed (conclusion: ${conclusion})"
              exit 1
            fi

            echo "CI is still running. Waiting ${wait_interval}s..."
            sleep "${wait_interval}"
            elapsed="$((elapsed + wait_interval))"
          done

          echo "Error: Timeout waiting for CI to complete"
          exit 1

      - name: Calculate next version
        id: next
        run: |
          set -euo pipefail

          # 再実行時の冪等性: HEAD を指すリリースタグが既にあれば再利用
          existing_tag="$(git tag --points-at=HEAD | grep -E '^v[0-9]+\.' | head -n1 || true)"
          if [ -n "${existing_tag}" ]; then
            echo "Found existing tag ${existing_tag} on HEAD, reusing"
            echo "next=${existing_tag}" >> "$GITHUB_OUTPUT"
            echo "version=${existing_tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # HEAD にタグがなければ、latest からインクリメント
          latest=$(git tag --sort=version:refname | tail -n1)
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case '${{ github.event.inputs.bump }}' in
            'PATCH') ((++patch));;
            'MINOR') ((++minor)); patch=0;;
            'MAJOR') ((++major)); minor=0; patch=0;;
            *) echo "Unknown bump: '${{ github.event.inputs.bump }}'" >&2; exit 1;;
          esac
          echo "next=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      # PyPI publish ・ タグ作成前に Dockerfile が構造的に build できることを検証する。
      # PYFLTR_VERSION 未指定で実行するため PyPI 上の最新公開版 (= 今回リリース対象の
      # 1 つ前のバージョン) で build を試行する。新リリース版固有の問題は検出できないが、
      # ベースイメージ消失・APT パッケージ削除・Dockerfile 構文エラー等の構造起因事故を
      # PyPI publish 前に止められる (publish 後の失敗は手動リカバリーが必要なため)。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Pre-flight Docker build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          secrets: |
            GITHUB_TOKEN=${{ github.token }}

      - name: Create tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.next.outputs.next }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.next.outputs.next }} already exists, skipping"
          else
            git tag "${{ steps.next.outputs.next }}"
            git push origin "${{ steps.next.outputs.next }}"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Build and publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish --check-url=https://pypi.org/simple/

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Append changelog link
        run: |
          prev_tag="$(git tag --sort=version:refname | grep -E '^v[0-9]' | tail -2 | head -1)"
          printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
            "${{ github.repository }}" "${prev_tag}" "${{ steps.next.outputs.next }}" >> CHANGES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.next.outputs.next }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.next.outputs.next }} already exists, skipping"
          else
            gh release create "${{ steps.next.outputs.next }}" \
              --title="${{ steps.next.outputs.next }}" --notes-file=CHANGES.md
          fi

      - name: Prune uv cache for CI
        run: uv cache prune --ci

  # GitHub Container Registry へ pyfltr 同梱 Docker イメージを publish する。
  # ``vX.Y.Z`` と ``latest`` の 2 タグを発行する。
  # Docker build / push と PyPI 配信エッジ伝搬待ち・初回 build 失敗時の再試行ロジックは
  # ``docker-build.yaml`` 側に集約する。CI 修復用の単発再ビルドにも同 workflow を利用する。
  docker-publish:
    needs: release
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yaml
    with:
      version: ${{ needs.release.outputs.version }}
