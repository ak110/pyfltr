name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: バージョン番号の更新タイプ
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
        default: PATCH

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 別ブランチからの誤リリースを防止
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          echo "Checking CI result for commit: ${commit_sha}"

          # 最大待機時間 (秒): 30 分
          max_wait=1800
          wait_interval=30
          elapsed=0

          while [ "${elapsed}" -lt "${max_wait}" ]; do
            # ci.yaml ワークフローの最新の実行結果を取得
            workflow_runs="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?branch=master&head_sha=${commit_sha}&per_page=1")"

            total_count="$(echo "${workflow_runs}" | jq -r '.total_count')"
            if [ "${total_count}" = "0" ]; then
              echo "No CI workflow found for sha=${commit_sha}. Waiting..."
              sleep "${wait_interval}"
              elapsed="$((elapsed + wait_interval))"
              continue
            fi

            status="$(echo "${workflow_runs}" | jq -r '.workflow_runs[0].status')"
            conclusion="$(echo "${workflow_runs}" | jq -r '.workflow_runs[0].conclusion')"
            echo "Current status: ${status}, conclusion: ${conclusion}"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "CI passed successfully"
                exit 0
              fi
              echo "Error: CI did not succeed (conclusion: ${conclusion})"
              exit 1
            fi

            echo "CI is still running. Waiting ${wait_interval}s..."
            sleep "${wait_interval}"
            elapsed="$((elapsed + wait_interval))"
          done

          echo "Error: Timeout waiting for CI to complete"
          exit 1

      - name: Calculate next version
        id: next
        run: |
          set -euo pipefail

          # 再実行時の冪等性: HEAD を指すリリースタグが既にあれば再利用
          existing_tag="$(git tag --points-at=HEAD | grep -E '^v[0-9]+\.' | head -n1 || true)"
          if [ -n "${existing_tag}" ]; then
            echo "Found existing tag ${existing_tag} on HEAD, reusing"
            echo "next=${existing_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # HEAD にタグがなければ、latest からインクリメント
          latest=$(git tag --sort=version:refname | tail -n1)
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case '${{ github.event.inputs.bump }}' in
            'PATCH') ((++patch));;
            'MINOR') ((++minor)); patch=0;;
            'MAJOR') ((++major)); minor=0; patch=0;;
            *) echo "Unknown bump: '${{ github.event.inputs.bump }}'" >&2; exit 1;;
          esac
          echo "next=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      # PyPI publish ・ タグ作成前に Dockerfile が構造的に build できることを検証する。
      # PYFLTR_VERSION 未指定で実行するため PyPI 上の最新公開版 (= 今回リリース対象の
      # 1 つ前のバージョン) で build を試行する。新リリース版固有の問題は検出できないが、
      # ベースイメージ消失・APT パッケージ削除・Dockerfile 構文エラー等の構造起因事故を
      # PyPI publish 前に止められる (publish 後の失敗は手動リカバリーが必要なため)。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Pre-flight Docker build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          secrets: |
            GITHUB_TOKEN=${{ github.token }}

      - name: Create tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.next.outputs.next }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.next.outputs.next }} already exists, skipping"
          else
            git tag "${{ steps.next.outputs.next }}"
            git push origin "${{ steps.next.outputs.next }}"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Build and publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish --check-url=https://pypi.org/simple/

      - name: Generate release notes
        uses: orhun/git-cliff-action@e16f179f0be49ecdfe63753837f20b9531642772 # v4.7.0
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Append changelog link
        run: |
          prev_tag="$(git tag --sort=version:refname | grep -E '^v[0-9]' | tail -2 | head -1)"
          printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
            "${{ github.repository }}" "${prev_tag}" "${{ steps.next.outputs.next }}" >> CHANGES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.next.outputs.next }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.next.outputs.next }} already exists, skipping"
          else
            gh release create "${{ steps.next.outputs.next }}" \
              --title="${{ steps.next.outputs.next }}" --notes-file=CHANGES.md
          fi

      - name: Prune uv cache for CI
        run: uv cache prune --ci

      # GitHub Container Registry へ pyfltr 同梱 Docker イメージを publish する。
      # ``vX.Y.Z`` と ``latest`` の 2 タグを発行する。
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker
        run: |
          tag="${{ steps.next.outputs.next }}"
          # PYFLTR_VERSION は PyPI 表記 (``v`` プレフィックス無し) に合わせる。
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # `uv publish --check-url` 直後でも PyPI 配信エッジ (Fastly) のキャッシュ反映には
      # ラグがあり、Docker build 内の `uv tool install pyfltr==X.Y.Z` が
      # 「No solution found」で失敗する事象が継続発生したため、Docker build 直前に
      # 同等条件 (clean cache) で解決可能になるまで polling する。
      # extras (`[python]`) 込みで解決確認することで、Docker build と同じ要求形を検証する。
      # 利用者向け推奨である `uv run --with="pyfltr[python]" pyfltr` の解決可能性も間接的に確認できる。
      # さらに ``required_consecutive`` 回連続成功するまで待つことで、
      # 単発でエッジを掴んだ瞬間だけ通る揺らぎを排除する。
      - name: Wait for PyPI propagation
        run: |
          set -euo pipefail
          version="${{ steps.docker.outputs.version }}"
          required_consecutive=3
          success_count=0
          for i in $(seq 1 60); do
            if uv tool install --reinstall --no-cache "pyfltr[python]==${version}" >/dev/null 2>&1; then
              success_count=$((success_count + 1))
              echo "Attempt ${i}/60: pyfltr[python]==${version} resolvable (${success_count}/${required_consecutive})"
              uv tool uninstall pyfltr >/dev/null 2>&1 || true
              if [ "${success_count}" -ge "${required_consecutive}" ]; then
                echo "pyfltr[python]==${version} is stably installable from PyPI"
                exit 0
              fi
            else
              if [ "${success_count}" -gt 0 ]; then
                echo "Attempt ${i}/60: resolution flapped, resetting consecutive counter"
              else
                echo "Attempt ${i}/60: pyfltr[python]==${version} not yet resolvable"
              fi
              success_count=0
            fi
            sleep 10
          done
          echo "Timeout waiting for PyPI propagation of pyfltr[python]==${version}" >&2
          exit 1

      # Wait for PyPI propagation を通過しても Docker builder ホストが別エッジを掴んで
      # 「No solution found」になる事象が稀に残るため、初回失敗時のみ短い間を空けて再試行する。
      # 1 回目失敗時は ``continue-on-error`` でエラーを無視し、再試行 step が結果を引き取る。
      - name: Build and push Docker image
        id: docker_build
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PYFLTR_VERSION=${{ steps.docker.outputs.version }}
          tags: |
            ghcr.io/ak110/pyfltr:${{ steps.docker.outputs.tag }}
            ghcr.io/ak110/pyfltr:latest
          secrets: |
            GITHUB_TOKEN=${{ github.token }}

      - name: Wait before Docker build retry
        if: steps.docker_build.outcome == 'failure'
        run: |
          echo "Initial Docker build failed, waiting 30s before retry..."
          sleep 30

      - name: Build and push Docker image (retry)
        if: steps.docker_build.outcome == 'failure'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PYFLTR_VERSION=${{ steps.docker.outputs.version }}
          tags: |
            ghcr.io/ak110/pyfltr:${{ steps.docker.outputs.tag }}
            ghcr.io/ak110/pyfltr:latest
          secrets: |
            GITHUB_TOKEN=${{ github.token }}
