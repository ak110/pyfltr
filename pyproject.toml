[project]
name = "pyfltr"
dynamic = ["version"]
description = "Python Formatters, Linters, and Testers Runner."
authors = [{ name = "aki.", email = "mark@aur.ll.to" }]
requires-python = ">=3.11,<4.0"
readme = "README.md"
license = {text = "MIT"}
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "autoflake>=2.0",
    "black>=22.0",
    "dill>=0.3",
    "flake8-bugbear>=23.0",
    "flake8-tidy-imports>=4.11.0",
    "isort>=5.0",
    "mypy>=1.0",
    "natsort>=8.4.0",
    "pre-commit>=4.5.1",
    "pylint-pydantic>=0.4.1",
    "pylint>=3.0",
    "pyproject-flake8>=7.0", # https://github.com/csachs/pyproject-flake8/issues/30
    "pyright[nodejs]>=1.1.403",
    "pytest-asyncio>=1.0.0",
    "pytest>=7.0",
    "pyupgrade>=3.0",
    "pyyaml>=6.0.3",
    "ruff>=0.12.1",
    "textual>=8.0.0",
    "ty>=0.0.26",
    "uv-sort>=0.5",
]

[project.optional-dependencies]
pyright = []

[project.urls]
Homepage = "https://github.com/ak110/pyfltr"

[project.scripts]
pyfltr = "pyfltr.main:main"

[dependency-groups]
dev = [
    "mkdocs-llmstxt>=0.2",
    "mkdocs-material>=9.6",
    "mkdocs>=1.6",
    "pre-commit>=4.2.0",
    "pytest-mock",
    "types-pyyaml>=6.0.12.20260408",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.uv]
exclude-newer = "1 day"

[tool.pyfltr]
preset = "latest"
ty = true
pylint-args = ["--jobs=4"]

[tool.ruff]
# https://docs.astral.sh/ruff/configuration/
line-length = 128

[tool.ruff.lint]
# https://docs.astral.sh/ruff/linter/#rule-selection
select = [
    # pydocstyle
    "D",
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # flake8-import-conventions
    "ICN",
    # isort
    "I",
]
ignore = [
    "D107", # Missing docstring in `__init__`
    "D415", # First line should end with a period
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**_test.py" = ["D"]
"**/__init__.py" = ["D104"]  # Missing docstring in public package

[tool.mypy]
# https://mypy.readthedocs.io/en/stable/config_file.html
allow_redefinition = true
check_untyped_defs = true
ignore_missing_imports = true
strict_optional = true
strict_equality = true
warn_no_return = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true

[tool.typos.default.extend-words]
# テストデータ内の意図的なtypo
teh = "teh"
hte = "hte"

[tool.pytest.ini_options]
# https://docs.pytest.org/en/latest/reference/reference.html#ini-options-ref
addopts = "--showlocals -p no:cacheprovider --maxfail=5 --durations=30 --durations-min=0.5"
log_level = "DEBUG"
xfail_strict = true
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
